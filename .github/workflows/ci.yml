name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
        if: ${{ hashFiles('package-lock.json') != '' }}

      - name: Install dependencies
        run: npm ci
        if: ${{ hashFiles('package.json') != '' && hashFiles('package-lock.json') != '' }}

      - name: Run lint (if script exists)
        run: npm run lint --if-present
        if: ${{ hashFiles('package.json') != '' }}

      - name: Run tests (if script exists)
        run: npm test --if-present
        if: ${{ hashFiles('package.json') != '' }}

      - name: Run build (if script exists)
        run: npm run build --if-present
        if: ${{ hashFiles('package.json') != '' }}

      - name: No package.json notice
        if: ${{ hashFiles('package.json') == '' }}
        run: echo "No package.json found; CI checks skipped."
